name: Deploy Shramic Community Web Application

on:
  workflow_dispatch: 

jobs:
  deploy:
    runs-on: ubuntu-latest   # ✅ IMPORTANT

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu
            rm -rf *

            git clone https://github.com/udaykumar2624/Blogger.git
            cd Blogger
            docker compose down
            docker compose up -d --build

