name: Deploy Shramic Community Web Application

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest   # ✅ IMPORTANT

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu

            if [ ! -d "Blogger" ]; then
                git clone https://github.com/udaykumar2624/Blogger.git
            fi

            cd Blogger
            git pull origin main
            docker compose down
            docker compose up -d --build

